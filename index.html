<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Marcador ACB PRO</title>
<style>
body {
background: #0b0f1a;
color: white;
font-family: Arial;
text-align: center;
}

.scoreboard {
display: flex;
justify-content: space-between;
background: #111;
padding: 20px;
border-radius: 10px;
margin: 20px;
}

.team {
width: 40%;
}

.score {
font-size: 60px;
font-weight: bold;
}

.center {
width: 20%;
}

.players {
display: flex;
justify-content: space-around;
margin-top: 20px;
}

.player-box {
background: #1a1f2e;
padding: 15px;
border-radius: 10px;
width: 40%;
}

button {
margin: 3px;
padding: 5px 10px;
border: none;
border-radius: 5px;
background: orange;
cursor: pointer;
}
</style>
</head>

<body>

<h1>🏀 MARCADOR ACB</h1>

<div class="scoreboard">
<div class="team">
<h2 id="teamA">Equipo A</h2>
<div class="score" id="scoreA">0</div>
<button onclick="addScore('A',1)">+1</button>
<button onclick="addScore('A',2)">+2</button>
<button onclick="addScore('A',3)">+3</button>
</div>

<div class="center">
<h2 id="time">10:00</h2>
<p>Cuarto: <span id="quarter">1</span></p>
<button onclick="startTimer()">▶️</button>
<button onclick="stopTimer()">⏸</button>
</div>

<div class="team">
<h2 id="teamB">Equipo B</h2>
<div class="score" id="scoreB">0</div>
<button onclick="addScore('B',1)">+1</button>
<button onclick="addScore('B',2)">+2</button>
<button onclick="addScore('B',3)">+3</button>
</div>
</div>

<div class="players">

<div class="player-box">
<h3>Jugadores Equipo A</h3>
<div id="playersA"></div>
</div>

<div class="player-box">
<h3>Jugadores Equipo B</h3>
<div id="playersB"></div>
</div>

</div>

<script>
let scoreA = 0;
let scoreB = 0;

function addScore(team, points) {
if(team === 'A') {
scoreA += points;
document.getElementById("scoreA").innerText = scoreA;
} else {
scoreB += points;
document.getElementById("scoreB").innerText = scoreB;
}
}

let timer;
let timeLeft = 600;

function startTimer() {
timer = setInterval(() => {
if(timeLeft > 0) {
timeLeft--;
let min = Math.floor(timeLeft / 60);
let sec = timeLeft % 60;
document.getElementById("time").innerText =
`${min}:${sec < 10 ? '0'+sec : sec}`;
}
}, 1000);
}

function stopTimer() {
clearInterval(timer);
}

// JUGADORES
let playersA = [
{name: "Jugador A1", points: 0},
{name: "Jugador A2", points: 0}
];

let playersB = [
{name: "Jugador B1", points: 0},
{name: "Jugador B2", points: 0}
];

function renderPlayers() {
let htmlA = "";
playersA.forEach((p,i) => {
htmlA += `
<p>${p.name}: ${p.points} pts
<button onclick="addPlayerPoints('A',${i},1)">+1</button>
<button onclick="addPlayerPoints('A',${i},2)">+2</button>
<button onclick="addPlayerPoints('A',${i},3)">+3</button>
</p>`;
});

let htmlB = "";
playersB.forEach((p,i) => {
htmlB += `
<p>${p.name}: ${p.points} pts
<button onclick="addPlayerPoints('B',${i},1)">+1</button>
<button onclick="addPlayerPoints('B',${i},2)">+2</button>
<button onclick="addPlayerPoints('B',${i},3)">+3</button>
</p>`;
});

document.getElementById("playersA").innerHTML = htmlA;
document.getElementById("playersB").innerHTML = htmlB;
}

function addPlayerPoints(team, index, pts) {
if(team === 'A') {
playersA[index].points += pts;
addScore('A', pts);
} else {
playersB[index].points += pts;
addScore('B', pts);
}
renderPlayers();
}

renderPlayers();
</script>

</body>
</html>
